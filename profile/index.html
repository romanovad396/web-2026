<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Profile</title>
        <link href="./style.css" rel="stylesheet">
    </head>
    <body class="clear-border-in-body">
        <div class="main-container">
            <div class="sidebar-field">
                <div class="navigation">
                    <img src="./image/menuitem.png" class="smart-button" width="40" height="40" alt="home">
                </div>
                <div class="navigation">
                    <img src="./image/menuitem(1).png" class="smart-button" width="40" height="40" alt="user">
                </div>
                <div class="navigation">
                    <img src="./image/menuitem(2).png" class="smart-button" width="40" height="40" alt="menu">
                </div>
            </div>

            <div class="column-field">
                <div class="header-field"></div>
                
                        <div class="user">
                            <div class="avatar-name-field">
                                <img src="./image/frame9.png" class="avatar-block" width="123" height="123" alt="ваняденисов">

                                <div class="user-meta">
                                    <h1 class="user-name-field">Ваня Денисов</h1>
                                    <div class="user-description">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</div>

                                    <div class="photo-number-field">
                                        <img src="./image/image16.png" class="photo-number-block" width="16" height="16" alt="icon">
                                        <span class="photo-number-text">43 поста</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="photo-field">
                            <div class="gallery-grid" aria-label="Галерея миниатюр">
                                <img src="./image/frame22.png" class="thumb" alt="image 1">
                                <img src="./image/frame23.png" class="thumb" alt="image 2">
                                <img src="./image/frame24.png" class="thumb" alt="image 3">
                                <img src="./image/frame25.png" class="thumb" alt="image 4">
                                <img src="./image/frame26.png" class="thumb" alt="image 5">
                                <img src="./image/frame27.png" class="thumb" alt="image 6">
                            </div>
                        </div>   
                </div> 
            </div> 

        </div> 
    </body>        
</html>
