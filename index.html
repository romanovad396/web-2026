<!DOCTYPE html>
<html>

<head>
    <title>Login and Password</title>
    <meta charset="UTF-8">
    <link href="./style.css" rel="stylesheet">
</head>

<body>
    <h1 class="title">Войти</h1>
    <div class="layout">
        <img src="./image/Smiling-men.jpg" alt="Smiling-men" class="image-element">
        <div>
            <div class="form">
                <label class="form-label" for="email">Электропочта</label>
                <div class="input-container"></div>
                <input class="input-field">
                <p class="form-description">Введите электропочту в формате **@*.**</p>
                <label class="form-label" for="password">Пароль</label>
                <div class="input-container password-container">
                <input class="password-field">
                </div>
                <a class="button" href="#" target="_blank" title="Продолжить">Продолжить</a>
            </div>
        </div>
    </div>
</body>

</html>
